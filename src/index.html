<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alinex</title>
  <link rel="stylesheet" href="css/style.min.css">
</head>
<body>

  <div class="container py-5">
    <h1 class="animate__animated animate__fadeInDown">Hello World!</h1>
    <p class="lead">Bootstrap + SCSS + Animate.css</p>

    <button class="btn btn-primary animate__animated animate__pulse animate__infinite">
      Button
    </button>

    <!-- SVG Sprite Usage Example -->
    <div class="mt-4">
      <svg class="icon" width="24" height="24">
        <use xlink:href="img/sprite.svg#arrow-right"></use>
      </svg>
    </div>
  </div>

  <script src="js/main.min.js"></script>
</body>
</html>
